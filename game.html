<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Supercar: Ultimate Open World</title>
    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        /* ==========================================
           CSS: UI & STYLING
           ========================================== */
        body { margin: 0; overflow: hidden; background: #111; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; -webkit-user-select: none; touch-action: none; }
        #game-canvas { display: block; width: 100vw; height: 100vh; }
        
        /* Start Menu */
        #start-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #222, #000); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: white; }
        #start-menu h1 { font-size: 50px; color: #00aaff; text-transform: uppercase; text-shadow: 0 0 20px #00aaff; margin-bottom: 10px; text-align: center; }
        #start-menu p { color: #ff5500; font-size: 18px; margin-bottom: 40px; text-align: center; padding: 0 20px; }
        #start-btn { padding: 15px 40px; font-size: 24px; font-weight: bold; color: #fff; background: #ff5500; border: none; border-radius: 5px; cursor: pointer; box-shadow: 0 0 15px #ff5500; transition: 0.3s; text-transform: uppercase; }
        #start-btn:hover { background: #fff; color: #ff5500; box-shadow: 0 0 25px #fff; }
        
        /* UI Overlays */
        #ui-layer { display: none; }
        
        /* HUD - Speed & Score */
        .hud { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); color: #fff; background: rgba(0, 0, 0, 0.7); padding: 15px 40px; border-radius: 50px; border: 2px solid #00aaff; text-shadow: 1px 1px 2px #000; pointer-events: none; z-index: 10; display: flex; align-items: center; gap: 30px; box-shadow: 0 0 20px rgba(0, 170, 255, 0.5); backdrop-filter: blur(5px); }
        .hud .speed-container { text-align: center; }
        .hud h2 { margin: 0; font-size: 35px; font-style: italic; color: #fff; }
        .hud h3 { margin: 0; font-size: 14px; color: #00aaff; letter-spacing: 2px; }
        .hud .gear { font-size: 25px; color: #ff5500; font-weight: bold; border-left: 2px solid #555; padding-left: 30px; }
        
        /* Minimap */
        #minimap-container { position: absolute; top: 20px; right: 20px; width: 150px; height: 150px; border-radius: 50%; border: 4px solid #333; background: rgba(0, 0, 0, 0.5); overflow: hidden; z-index: 10; box-shadow: 0 0 15px rgba(0,0,0,0.8); }
        #minimap { width: 100%; height: 100%; border-radius: 50%; }
        #minimap-player { position: absolute; top: 50%; left: 50%; width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-bottom: 12px solid #00aaff; transform: translate(-50%, -50%); z-index: 11; }

        /* Time & Env Info */
        #env-info { position: absolute; top: 20px; left: 20px; color: white; font-size: 16px; background: rgba(0,0,0,0.6); padding: 10px 15px; border-radius: 8px; border-left: 4px solid #ffaa00; z-index: 10; font-weight: bold; }

        /* Mobile Controls */
        .controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 10; }
        .btn-group { display: flex; gap: 15px; }
        .ctrl-btn { width: 80px; height: 80px; border-radius: 50%; border: none; background: rgba(255, 255, 255, 0.1); color: white; font-size: 28px; font-weight: bold; cursor: pointer; border: 2px solid rgba(255, 255, 255, 0.3); backdrop-filter: blur(5px); box-shadow: 0 5px 15px rgba(0,0,0,0.5); -webkit-tap-highlight-color: transparent; }
        .ctrl-btn:active { transform: scale(0.9); background: rgba(255, 255, 255, 0.3); }
        .btn-steer { background: rgba(0, 170, 255, 0.2); border-color: rgba(0, 170, 255, 0.5); }
        .btn-steer:active { background: rgba(0, 170, 255, 0.7); }
        .btn-red { background: rgba(255, 0, 0, 0.2); border-color: rgba(255, 0, 0, 0.5); }
        .btn-red:active { background: rgba(255, 0, 0, 0.7); }
        .btn-green { background: rgba(0, 255, 0, 0.2); border-color: rgba(0, 255, 0, 0.5); }
        .btn-green:active { background: rgba(0, 255, 0, 0.7); }

        /* Speed Blur */
        .blur-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.4) 100%); opacity: 0; z-index: 5; transition: opacity 0.2s; }

        @media (min-width: 768px) {
            .controls { display: none; }
        }
    </style>
</head>
<body>

    <!-- START MENU -->
    <div id="start-menu">
        <h1>Ultimate 3D Supercar</h1>
        <p>Landscape Auto-Rotate enabled. Use W,A,S,D or On-Screen Controls.</p>
        <button id="start-btn" onclick="startGame()">Start Engine</button>
    </div>

    <!-- GAME UI -->
    <div id="ui-layer">
        <div class="blur-overlay" id="blur-overlay"></div>
        
        <div id="env-info">
            TIME: <span id="time-display">12:00</span><br>
            MODE: <span style="color:#00aaff">OPEN WORLD</span>
        </div>

        <div id="minimap-container">
            <canvas id="minimap"></canvas>
            <div id="minimap-player"></div>
        </div>

        <div class="hud">
            <div class="speed-container">
                <h2 id="speed">0</h2>
                <h3>KM / H</h3>
            </div>
            <div class="gear" id="gear">N</div>
        </div>

        <div class="controls">
            <div class="btn-group">
                <button class="ctrl-btn btn-steer" id="left">⬅</button>
                <button class="ctrl-btn btn-steer" id="right">➡</button>
            </div>
            <div class="btn-group">
                <button class="ctrl-btn btn-red" id="brake">B</button>
                <button class="ctrl-btn btn-green" id="turbo">A</button>
            </div>
        </div>
    </div>

    <script>
        /* ==========================================
           GAME ENGINE & LOGIC (THREE.JS)
           ========================================== */
        
        let scene, camera, renderer, carGroup;
        let minimapCamera, minimapRenderer, minimapScene;
        
        // Physics Variables
        let speed = 0, heading = 0, steering = 0;
        let isGas = false, isReverse = false;
        let moveLeft = false, moveRight = false;
        let driftFactor = 0;
        
        // Constants
        const MAX_SPEED = 300; 
        const ACCELERATION = 80;
        const BRAKING = 150;
        const FRICTION = 0.985;
        const TURN_SPEED = 2.5; 

        // Environment variables
        let timeOfDay = 12; // 0 to 24
        let sunLight, ambientLight, skyColor;
        let headlights = [];
        let skidMarks = [];
        let particles = [];
        let wheels = [];
        let gameActive = false;

        // Init Engine
        function initGame() {
            // Main Scene
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x87CEEB, 0.003);

            // Camera
            camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 2000);
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.domElement.id = 'game-canvas';
            document.body.appendChild(renderer.domElement);

            // Lighting System (Day/Night)
            ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            
            sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
            sunLight.position.set(200, 500, 200);
            sunLight.castShadow = true;
            sunLight.shadow.camera.left = -200;
            sunLight.shadow.camera.right = 200;
            sunLight.shadow.camera.top = 200;
            sunLight.shadow.camera.bottom = -200;
            sunLight.shadow.mapSize.width = 2048;
            sunLight.shadow.mapSize.height = 2048;
            scene.add(sunLight);

            buildCar();
            buildWorld();
            initMinimap();
            
            gameActive = true;
            animate();
        }

        // --- CAR BUILDER (Highly Detailed) ---
        function buildCar() {
            carGroup = new THREE.Group();
            
            // Materials
            const cyanMat = new THREE.MeshStandardMaterial({ color: 0x00aaff, metalness: 0.8, roughness: 0.2 });
            const orangeMat = new THREE.MeshStandardMaterial({ color: 0xff5500, metalness: 0.6, roughness: 0.3 });
            const blackMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.1 });
            const glassMat = new THREE.MeshStandardMaterial({ color: 0x000000, metalness: 1, roughness: 0, transparent: true, opacity: 0.8 });

            // Main Body (Aerodynamic shape)
            const chassis = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.6, 5.0), cyanMat);
            chassis.position.y = 0.6;
            chassis.castShadow = true;
            carGroup.add(chassis);

            // Cabin / Roof
            const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.5, 2.2), glassMat);
            cabin.position.set(0, 1.1, -0.3);
            cabin.castShadow = true;
            carGroup.add(cabin);

            // Orange Accents (Front Splitter)
            const splitter = new THREE.Mesh(new THREE.BoxGeometry(2.6, 0.1, 0.8), orangeMat);
            splitter.position.set(0, 0.35, 2.5); // Facing forward (+Z)
            carGroup.add(splitter);

            // Side Skirts (Orange)
            const skirtL = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 3.5), orangeMat);
            skirtL.position.set(-1.3, 0.35, 0);
            carGroup.add(skirtL);
            const skirtR = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 3.5), orangeMat);
            skirtR.position.set(1.3, 0.35, 0);
            carGroup.add(skirtR);

            // Huge Rear Spoiler
            const wingBase = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.1, 0.6), cyanMat);
            wingBase.position.set(0, 1.3, -2.3);
            carGroup.add(wingBase);
            const wingPillar1 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.4, 0.2), blackMat);
            wingPillar1.position.set(-0.8, 1.0, -2.3);
            carGroup.add(wingPillar1);
            const wingPillar2 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.4, 0.2), blackMat);
            wingPillar2.position.set(0.8, 1.0, -2.3);
            carGroup.add(wingPillar2);

            // Exhaust Pipes
            const exhaustGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.3, 16);
            exhaustGeo.rotateX(Math.PI/2);
            const exhaust1 = new THREE.Mesh(exhaustGeo, blackMat);
            exhaust1.position.set(-0.5, 0.5, -2.6);
            carGroup.add(exhaust1);
            const exhaust2 = new THREE.Mesh(exhaustGeo, blackMat);
            exhaust2.position.set(0.5, 0.5, -2.6);
            carGroup.add(exhaust2);

            // Wheels (Dynamic)
            const wheelGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.5, 24);
            wheelGeo.rotateZ(Math.PI / 2);
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111, roughness: 1 });
            
            const wPos = [
                {x: -1.3, y: 0.45, z: 1.6, isFront: true}, 
                {x: 1.3, y: 0.45, z: 1.6, isFront: true},
                {x: -1.3, y: 0.45, z: -1.6, isFront: false}, 
                {x: 1.3, y: 0.45, z: -1.6, isFront: false}
            ];
            
            wPos.forEach(pos => {
                const wGroup = new THREE.Group();
                wGroup.position.set(pos.x, pos.y, pos.z);
                
                const tire = new THREE.Mesh(wheelGeo, wheelMat);
                tire.castShadow = true;
                wGroup.add(tire);
                
                // Orange Rim
                const rim = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.52, 8).rotateZ(Math.PI/2), orangeMat);
                wGroup.add(rim);
                
                carGroup.add(wGroup);
                wheels.push({ group: wGroup, isFront: pos.isFront });
            });

            // Headlights (For Night Mode)
            const hL = new THREE.SpotLight(0xffffff, 0, 150, Math.PI/6, 0.5, 1);
            hL.position.set(-0.8, 0.7, 2.5);
            hL.target.position.set(-0.8, 0.7, 10);
            carGroup.add(hL);
            carGroup.add(hL.target);
            headlights.push(hL);

            const hR = new THREE.SpotLight(0xffffff, 0, 150, Math.PI/6, 0.5, 1);
            hR.position.set(0.8, 0.7, 2.5);
            hR.target.position.set(0.8, 0.7, 10);
            carGroup.add(hR);
            carGroup.add(hR.target);
            headlights.push(hR);

            scene.add(carGroup);
        }

        // --- WORLD GENERATION (Massive Map) ---
        function buildWorld() {
            // Ground
            const groundGeo = new THREE.PlaneGeometry(5000, 5000);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x2b3d1b, roughness: 1, metalness: 0 }); // Dark Grass
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // Procedural Grid Overlay for scale
            const grid = new THREE.GridHelper(5000, 250, 0x111111, 0x111111);
            grid.position.y = 0.05;
            scene.add(grid);

            // Massive Stunt Ramps
            const rampMat = new THREE.MeshStandardMaterial({ color: 0xff5500, metalness: 0.3, roughness: 0.6 });
            for(let i=0; i<40; i++) {
                const rampGeo = new THREE.BoxGeometry(15, 3, 20);
                const ramp = new THREE.Mesh(rampGeo, rampMat);
                ramp.position.set((Math.random()-0.5)*3000, 0, (Math.random()-0.5)*3000);
                ramp.rotation.x = Math.PI / 10; 
                ramp.rotation.y = Math.random() * Math.PI;
                ramp.castShadow = true;
                ramp.receiveShadow = true;
                scene.add(ramp);
            }

            // Procedural City / Blocks
            const bldgMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
            const bldgGeo = new THREE.BoxGeometry(1, 1, 1);
            for(let i=0; i<150; i++) {
                const bldg = new THREE.Mesh(bldgGeo, bldgMat);
                const w = 20 + Math.random()*30;
                const h = 50 + Math.random()*150;
                const d = 20 + Math.random()*30;
                bldg.scale.set(w, h, d);
                // Keep center clear
                let bx, bz;
                do {
                    bx = (Math.random()-0.5)*4000;
                    bz = (Math.random()-0.5)*4000;
                } while (Math.abs(bx) < 200 && Math.abs(bz) < 200);

                bldg.position.set(bx, h/2, bz);
                bldg.castShadow = true;
                bldg.receiveShadow = true;
                scene.add(bldg);
            }
        }

        // --- MINIMAP SYSTEM ---
        function initMinimap() {
            const canvas = document.getElementById('minimap');
            minimapRenderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true });
            minimapRenderer.setSize(150, 150);
            
            // Orthographic camera pointing down
            minimapCamera = new THREE.OrthographicCamera(-300, 300, 300, -300, 1, 1000);
            minimapCamera.position.y = 500;
            minimapCamera.lookAt(0, 0, 0);
        }

        // --- PARTICLE & SKID SYSTEM ---
        function createTireMark(x, z, angle) {
            const markGeo = new THREE.PlaneGeometry(0.8, 1.5);
            const markMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.3 });
            const mark = new THREE.Mesh(markGeo, markMat);
            mark.rotation.x = -Math.PI / 2;
            mark.rotation.z = angle;
            mark.position.set(x, 0.06, z);
            scene.add(mark);
            skidMarks.push(mark);
            if(skidMarks.length > 200) {
                scene.remove(skidMarks[0]);
                skidMarks.shift();
            }
        }

        function createDustParticle(x, z) {
            const size = Math.random() * 1.5 + 0.5;
            const pGeo = new THREE.BoxGeometry(size, size, size);
            const pMat = new THREE.MeshBasicMaterial({ color: 0xaaaaaa, transparent: true, opacity: 0.6 });
            const p = new THREE.Mesh(pGeo, pMat);
            p.position.set(x + (Math.random()-0.5)*2, 0.5, z + (Math.random()-0.5)*2);
            scene.add(p);
            particles.push({ mesh: p, life: 1.0 });
        }

        // --- CORE GAME LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            if (!gameActive) return;
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // 1. Time & Day/Night Logic
            timeOfDay += delta * 0.2; // Speed of time
            if(timeOfDay >= 24) timeOfDay = 0;
            
            let timeFmt = Math.floor(timeOfDay).toString().padStart(2, '0') + ":00";
            document.getElementById('time-display').innerText = timeFmt;

            // Lighting based on time
            if (timeOfDay > 6 && timeOfDay < 18) {
                // Day
                scene.background = new THREE.Color(0x87CEEB);
                scene.fog.color.setHex(0x87CEEB);
                sunLight.intensity = 1.2;
                headlights.forEach(h => h.intensity = 0); // Lights off
            } else if (timeOfDay >= 18 && timeOfDay < 19) {
                // Sunset
                scene.background = new THREE.Color(0xff7700);
                scene.fog.color.setHex(0xff7700);
                sunLight.intensity = 0.5;
                headlights.forEach(h => h.intensity = 2); // Lights on
            } else {
                // Night
                scene.background = new THREE.Color(0x050510);
                scene.fog.color.setHex(0x050510);
                sunLight.intensity = 0.1;
                headlights.forEach(h => h.intensity = 5); // Lights bright
            }

            // 2. Physics & Inputs
            let accelForce = 0;
            if (isGas) accelForce = ACCELERATION;
            else if (isReverse) accelForce = -BRAKING;

            speed += accelForce * delta;
            
            // Friction/Drag
            if (!isGas && !isReverse) {
                speed *= FRICTION;
                if(Math.abs(speed) < 1) speed = 0;
            }
            
            // Limit speed
            if(speed > MAX_SPEED) speed = MAX_SPEED;
            if(speed < -MAX_SPEED/2) speed = -MAX_SPEED/2;

            // Steering Logic (Drift mechanic)
            let turnRatio = 0;
            if (Math.abs(speed) > 5) {
                const turnMultiplier = speed > 0 ? 1 : -1;
                const steeringEffect = Math.max(0.3, 1 - (Math.abs(speed) / MAX_SPEED)); // Turn wider at high speed
                
                if (moveLeft) turnRatio = TURN_SPEED * steeringEffect * delta;
                if (moveRight) turnRatio = -TURN_SPEED * steeringEffect * delta;
                
                heading += turnRatio * turnMultiplier;
            }

            // Update Car Position (+Z is forward)
            const velocityX = Math.sin(heading) * speed * delta;
            const velocityZ = Math.cos(heading) * speed * delta;
            
            carGroup.position.x += velocityX;
            carGroup.position.z += velocityZ;
            carGroup.rotation.y = heading;

            // Fake Gravity / Floor restrict
            if(carGroup.position.y > 0.6) {
                carGroup.position.y -= 15 * delta; // Fall down from ramps
            } else {
                carGroup.position.y = 0.6;
            }

            // Skid marks & Particles on hard turns or braking
            if ((Math.abs(turnRatio) > 0.02 && speed > 100) || (isReverse && speed > 50)) {
                // Rear wheels positions approximately
                createTireMark(carGroup.position.x - Math.sin(heading)*2, carGroup.position.z - Math.cos(heading)*2, heading);
                createDustParticle(carGroup.position.x, carGroup.position.z);
            }

            // Update Particles
            for(let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.life -= delta * 2;
                p.mesh.position.y += delta * 2;
                p.mesh.scale.set(p.life, p.life, p.life);
                p.mesh.material.opacity = p.life * 0.5;
                if(p.life <= 0) {
                    scene.remove(p.mesh);
                    particles.splice(i, 1);
                }
            }

            // Animate Wheels
            wheels.forEach(w => {
                // Spin
                w.group.children.forEach(c => c.rotation.x -= speed * delta * 0.15);
                // Turn Front Wheels
                if (w.isFront) {
                    if (moveLeft) w.group.rotation.y = THREE.MathUtils.lerp(w.group.rotation.y, 0.5, 0.1);
                    else if (moveRight) w.group.rotation.y = THREE.MathUtils.lerp(w.group.rotation.y, -0.5, 0.1);
                    else w.group.rotation.y = THREE.MathUtils.lerp(w.group.rotation.y, 0, 0.1);
                }
            });

            // 3. UI Updates
            document.getElementById('speed').innerText = Math.floor(Math.abs(speed));
            if(speed > 5) document.getElementById('gear').innerText = "D";
            else if(speed < -5) document.getElementById('gear').innerText = "R";
            else document.getElementById('gear').innerText = "N";

            // Speed Blur
            const blurDiv = document.getElementById('blur-overlay');
            if(speed > 200) {
                blurDiv.style.opacity = (speed - 200) / 100;
            } else {
                blurDiv.style.opacity = 0;
            }

            // 4. Camera Follow Logic (Smooth Chase Camera)
            const camDist = 14 + (Math.abs(speed) * 0.02);
            const camHeight = 4.5 + (Math.abs(speed) * 0.005);
            
            const targetCamX = carGroup.position.x - Math.sin(heading) * camDist;
            const targetCamZ = carGroup.position.z - Math.cos(heading) * camDist;
            
            camera.position.x = THREE.MathUtils.lerp(camera.position.x, targetCamX, 0.1);
            camera.position.z = THREE.MathUtils.lerp(camera.position.z, targetCamZ, 0.1);
            camera.position.y = THREE.MathUtils.lerp(camera.position.y, carGroup.position.y + camHeight, 0.1);
            
            camera.lookAt(
                carGroup.position.x + Math.sin(heading)*10, 
                carGroup.position.y + 1, 
                carGroup.position.z + Math.cos(heading)*10
            );

            // 5. Render Main Scene
            renderer.render(scene, camera);

            // 6. Update Minimap
            minimapCamera.position.x = carGroup.position.x;
            minimapCamera.position.z = carGroup.position.z;
            
            const playerBlip = document.getElementById('minimap-player');
            playerBlip.style.transform = `translate(-50%, -50%) rotate(${heading * (180/Math.PI)}deg)`;
            
            minimapRenderer.render(scene, minimapCamera);
        }

        /* ==========================================
           INPUT CONTROLS & AUTO-ROTATE LOGIC
           ========================================== */

        // Fullscreen and Landscape Force API
        function startGame() {
            let elem = document.documentElement;
            
            // 1. Request Fullscreen
            let fsPromise;
            if (elem.requestFullscreen) fsPromise = elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) fsPromise = elem.webkitRequestFullscreen();
            else if (elem.msRequestFullscreen) fsPromise = elem.msRequestFullscreen();

            if(fsPromise) {
                fsPromise.then(() => {
                    // 2. Lock Orientation to Landscape (Mobile only)
                    if (screen.orientation && screen.orientation.lock) {
                        screen.orientation.lock('landscape').catch(err => {
                            console.log("Orientation lock not supported or failed: ", err);
                        });
                    }
                }).catch(err => console.log("Fullscreen Error: ", err));
            }

            // Hide Menu, Show Game
            document.getElementById('start-menu').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'block';
            
            initGame();
        }

        // Keyboard Controls (PC)
        window.addEventListener('keydown', (e) => {
            if(e.code === 'ArrowLeft' || e.code === 'KeyA') moveLeft = true;
            if(e.code === 'ArrowRight' || e.code === 'KeyD') moveRight = true;
            if(e.code === 'ArrowUp' || e.code === 'KeyW') isGas = true;
            if(e.code === 'ArrowDown' || e.code === 'KeyS') isReverse = true;
        });
        window.addEventListener('keyup', (e) => {
            if(e.code === 'ArrowLeft' || e.code === 'KeyA') moveLeft = false;
            if(e.code === 'ArrowRight' || e.code === 'KeyD') moveRight = false;
            if(e.code === 'ArrowUp' || e.code === 'KeyW') isGas = false;
            if(e.code === 'ArrowDown' || e.code === 'KeyS') isReverse = false;
        });

        // Touch Controls (Mobile)
        const bindBtn = (id, onAct, offAct) => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); onAct(); });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); offAct(); });
            btn.addEventListener('mousedown', onAct);
            btn.addEventListener('mouseup', offAct);
            btn.addEventListener('mouseleave', offAct);
        };
        bindBtn('left', () => moveLeft = true, () => moveLeft = false);
        bindBtn('right', () => moveRight = true, () => moveRight = false);
        bindBtn('turbo', () => isGas = true, () => isGas = false);
        bindBtn('brake', () => isReverse = true, () => isReverse = false);

        // Handle Resizing dynamically
        window.addEventListener('resize', () => {
            if(camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });

    </script>
</body>
</html>
