<style>

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

body {
  background: linear-gradient(135deg, #FF6B9D 0%, #FF8E53 100%);

.back-btn {

.icon {

}
@keyframes glow {
  from { filter: drop-shadow(0 0 10px rgba(255,255,255,0.3)); }

}

h1 {
  color: #fff;

  font-weight: 700;
  text-shadow: 0 2px 10px rgba(0,0,0,0.2);

  text-align: center;

.card {
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.2);

  color: #fff;
  font-size: 22px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 10px;

}
.card-title .dot {
  width: 10px; height: 10px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 0 10px #fff;
}

.card p {
  color: rgba(255,255,255,0.9);
  font-size: 15px;
  line-height: 1.6;
  margin-bottom: 25px;
}

.btn {
  width: 100%;
  background: linear-gradient(90deg, #FF006E, #FF3D00);
  color: #fff;
  font-weight: 700;
  font-size: 18px;
  padding: 16px;
  border: none;
  border-radius: 15px;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 5px 20px rgba(255,0,110,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255,0,110,0.6); }

.float-emoji {

  font-size: 22px;
  animation: float 6s infinite ease-in-out;

<span class="float-emoji" style="top:70%; left:10%;">🗑️</span>
