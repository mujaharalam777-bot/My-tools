<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;color:#fff;}
.container{width:100%;max-width:500px;text-align:center;}
.header{margin-bottom:30px;}
.header .icon{font-size:60px;margin-bottom:15px;}
.header h1{font-size:28px;font-weight:800;color:#fff;}
.card{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);backdrop-filter:blur(20px);border-radius:24px;padding:30px;margin-bottom:20px;box-shadow:0 8px 32px rgba(0,0,0,.3);}
.badge{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px;}
.dot{width:12px;height:12px;background:#22c55e;border-radius:50%;box-shadow:0 0 10px #22c55e;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.badge-text{font-size:20px;font-weight:800;color:#fff;}
.card p{font-size:14px;opacity:0.8;margin-bottom:20px;}
.btn{width:100%;padding:16px;border:none;border-radius:14px;font-size:16px;font-weight:800;cursor:pointer;transition:0.3s;}
.btn-green{background:#22c55e;color:#000;}
.btn-green:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(34,197,94,0.4);}
.btn-orange{background:#f97316;color:#fff;}
.btn-orange:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(249,115,22,0.4);}
.pro-icon{font-size:60px;margin-bottom:15px;}
.feature-list{text-align:left;margin:20px 0;}
.feature-item{display:flex;align-items:center;gap:10px;margin-bottom:12px;font-size:14px;opacity:0.9;}
.feature-item .tick{color:#22c55e;font-weight:800;font-size:16px;}
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="icon">🔑</div>
        <h1>Password Generator</h1>
    </div>

    <!-- FREE VERSION CARD -->
    <div class="card">
        <div class="badge">
            <div class="dot"></div>
            <div class="badge-text">Free Version</div>
        </div>
        <p>Basic Password Generator</p>
        <button class="btn btn-green" onclick="window.location.href='password-free.html'">Open Free</button>
    </div>

  <!-- PRO VERSION CARD -->
<div class="card">
    <div class="badge"></div> <!-- badge ta faka rakhlam dot er jonno -->
    
    <h1 style="font-size:24px;margin-bottom:10px;text-align:center;">Password Generator Pro</h1>
    <p style="text-align:center;margin-bottom:15px;opacity:0.8;">Quantum Password Generator</p>

    <div class="feature-list">
        <div class="feature-item"><span class="tick">✓</span> Passphrase Generator</div>
        <div class="feature-item"><span class="tick">✓</span> Password Strength Checker</div>
        <div class="feature-item"><span class="tick">✓</span> Breach Check API</div>
        <div class="feature-item"><span class="tick">✓</span> Save & Export History</div>
    </div>

    <button class="btn btn-orange" style="width:100%;margin-top:20px;" onclick="window.location.href='password-pro.html'">Open Pro</button>
</div>

</body>
                                                            </html>
