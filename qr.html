<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator</title>
<style>
  body {
    background: linear-gradient(180deg, #1a2a32 0%, #0d1a1f 100%);
    color: white;
    font-family: Arial, sans-serif;
    padding: 15px;
    margin: 0;
    min-height: 100vh;
  }
  .back {
    font-size: 16px;
    margin-bottom: 20px;
    cursor: pointer;
  }
  .icon {
    font-size: 50px;
    text-align: center;
    margin: 15px 0;
  }
  h1 {
    text-align: center;
    font-size: 26px;
    margin-bottom: 25px;
    font-weight: 600;
  }
  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 25px 20px;
    margin: 20px 0;
    text-align: center;
    backdrop-filter: blur(10px);
  }
  .green-dot {
    width: 10px;
    height: 10px;
    background: #00ff88;
    border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
  }
  .card-title {
    font-size: 20px;
    font-weight: bold;
    margin: 5px 0 10px 0;
  }
  .card-sub {
    color: #aaa;
    font-size: 14px;
    margin-bottom: 20px;
  }
  .btn {
    background: #00ff88;
    color: black;
    border: none;
    padding: 16px;
    width: 100%;
    border-radius: 15px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    text-decoration: none;
    display: block;
  }
  .btn-pro {
    background: #ff9500;
    color: white;
  }
  .btn:hover {
    opacity: 0.9;
  }
  .feature {
    text-align: left;
    margin: 12px 0;
    color: #ddd;
    font-size: 15px;
    display: flex;
    align-items: center;
  }
  .feature span {
    color: #00ff88;
    margin-right: 10px;
    font-size: 18px;
    font-weight: bold;
  }
  .lock-icon {
    font-size: 50px;
    margin: 10px 0;
  }
</style>
</head>
<body>

<div class="back">← Back</div>

<div class="icon">🔲</div>
<h1>QR Code Generator</h1>

<!-- Card 1: Free -->
<div class="card">
  <p><span class="green-dot"></span> <span class="card-title">Free Version</span></p>
  <p class="card-sub">Basic QR Generator</p>
  <a href="qr-generator.html" class="btn">Open Free</a>  <!-- Ekhane link -->
</div>

<!-- Card 2: Pro -->
<div class="card">
  <div class="lock-icon">🔒</div>
  <h2 class="card-title">QR Generator Pro</h2>
  <div class="feature"><span>✓</span> Logo add kora</div>
  <div class="feature"><span>✓</span> Color & Gradient</div>
  <div class="feature"><span>✓</span> QR Scan kora</div>
  <div class="feature"><span>✓</span> HD Download</div>
  <a href="#" class="btn btn-pro">🚧 Unlock Soon</a>
</div>

</body>
</html>
