<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator</title>
<style>
  body {
    background: linear-gradient(180deg, #1a2e3a 0%, #0f1a22 100%);
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    padding: 15px;
    margin: 0;
    min-height: 100vh;
  }
  .back {
    font-size: 16px;
    margin-bottom: 25px;
    cursor: pointer;
  }
  .icon {
    font-size: 50px;
    text-align: center;
    margin: 15px 0;
  }
  h1 {
    text-align: center;
    font-size: 26px;
    margin-bottom: 30px;
    font-weight: 700;
  }
  .card {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 25px 30px;
    margin-bottom: 15px;
    text-align: center;
    backdrop-filter: blur(20px);
  }
  .green-dot {
    width: 10px;
    height: 10px;
    background: #00ff88;
    border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
    box-shadow: 0 0 8px #00ff88;
  }
  .card-title {
    font-size: 20px;
    font-weight: 700;
    margin: 8px 0 6px 0;
  }
  .card-sub {
    color: #a0b0c0;
    font-size: 14px;
    margin-bottom: 20px;
  }
  .btn {
    background: #00ff88;
    color: #000;
    border: none;
    padding: 16px;
    width: 100%;
    border-radius: 14px;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    display: block;
  }
  .btn-pro {
    background: #ff9500;
    color: white;
  }
  .lock-icon {
    font-size: 50px;
    margin: 5px 0 10px 0;
  }
  .feature {
    text-align: left;
    margin: 14px 0;
    color: #e0e0e0;
    font-size: 15px;
    display: flex;
    align-items: center;
  }
  .feature span {
    color: #00ff88;
    margin-right: 10px;
    font-size: 18px;
    font-weight: bold;
  }
</style>
</head>
<body>

<div class="back">← Back</div>

<div class="icon">⬜</div>
<h1>QR Code Generator</h1>

<!-- Card 1: Free -->
<div class="card">
  <p><span class="green-dot"></span> <span class="card-title">Free Version</span></p>
  <p class="card-sub">Basic QR Generator</p>
  <a href="qr-generator.html" class="btn">Open Free</a>
</div>

<!-- Card 2: Pro -->
<div class="card">
  <div class="lock-icon">🔓</div>
  <h2 class="card-title">QR Generator Pro</h2>
  <div class="feature"><span>✓</span> Logo add kora</div>
  <div class="feature"><span>✓</span> Color & Gradient</div>
  <div class="feature"><span>✓</span> QR Scan kora</div>
  <div class="feature"><span>✓</span> HD Download</div>
  <a href="qr-pro.html" class="btn btn-pro">🚀 Open Pro</a>
</div>

</body>
</html>
