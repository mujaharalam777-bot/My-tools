<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Generator - Choose Version | My Tools</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;min-height:100vh;padding:20px
}
.header{padding:15px 0;margin-bottom:20px}
.back-btn{color:#fff;text-decoration:none;font-size:16px;font-weight:600}
.header-center{text-align:center;margin-top:20px}
.header-center .icon{font-size:60px;margin-bottom:10px}
.header-center h1{font-size:2rem;font-weight:800}

.container{max-width:600px;margin:30px auto}
.version-card{
  background:rgba(255,255,255,0.08);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.1);border-radius:25px;
  padding:30px;margin-bottom:25px;text-align:center;transition:0.3s
}
.version-card:hover{transform:translateY(-5px);background:rgba(255,255,255,0.12)}
.status-dot{display:inline-block;width:12px;height:12px;background:#22c55e;border-radius:50%;margin-right:8px}
.version-card h2{font-size:1.5rem;margin:10px 0;font-weight:700}
.version-card p{opacity:0.8;margin-bottom:20px}

.btn-free{
  width:100%;padding:16px;border:none;border-radius:15px;
  background:#22c55e;color:#000;font-weight:700;font-size:1.1rem;
  cursor:pointer;text-decoration:none;display:block;transition:0.3s
}
.btn-free:hover{transform:scale(1.02);box-shadow:0 10px 30px rgba(34,197,94,0.4)}

.btn-pro{
  width:100%;padding:16px;border:none;border-radius:15px;
  background:linear-gradient(135deg,#f97316,#f59e0b);color:#fff;
  font-weight:700;font-size:1.1rem;cursor:not-allowed;text-decoration:none;display:block
}

.feature-list{list-style:none;text-align:left;margin:20px 0}
.feature-list li{margin:12px 0;font-size:15px}
.feature-list li::before{content:"✓ ";color:#22c55e;font-weight:bold;margin-right:8px}
.lock-icon{font-size:50px;margin-bottom:10px}
</style>
</head>
<body>

<div class="header">
  <a href="index.html" class="back-btn">← Back</a>
</div>

<div class="header-center">
  <div class="icon">📱</div>
  <h1>QR Code Generator</h1>
</div>

<div class="container">

  <!-- FREE VERSION CARD -->
  <div class="version-card">
    <span class="status-dot"></span><b>Free Version</b>
    <h2>Basic QR Generator</h2>
    <p>URL to QR Code with Download</p>
    <a href="qr-generator.html" class="btn-free">Open Free</a>
  </div>

  <!-- PRO VERSION CARD -->
  <div class="version-card">
    <div class="lock-icon">🔒</div>
    <h2>QR Generator Pro</h2>
    <ul class="feature-list">
      <li>WiFi QR - Auto Connect</li>
      <li>WhatsApp Direct Chat QR</li>
      <li>Custom Colors + Logo</li>
      <li>Batch QR Generator</li>
      <li>No Watermark + HD Export</li>
    </ul>
    <button class="btn-pro">🚧 Unlock Soon</button>
  </div>

</div>

</body>
  </html>
