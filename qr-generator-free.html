<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basic QR Generator | My Tools</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;min-height:100vh;padding:20px
}
.header{padding:15px 0;margin-bottom:10px;display:flex;align-items:center;gap:15px}
.back-btn{color:#fff;text-decoration:none;font-size:16px;font-weight:600}
.header h1{font-size:1.5rem}

.container{max-width:600px;margin:20px auto;background:rgba(255,255,255,0.08);backdrop-filter:blur(20px);border-radius:25px;padding:30px;border:1px solid rgba(255,255,255,0.1)}
.input-group{margin-bottom:20px}
.input-group label{display:block;margin-bottom:8px;font-weight:600}
.input-group input{
  width:100%;padding:14px 18px;border-radius:12px;border:2px solid transparent;
  background:rgba(255,255,255,0.1);color:#fff;font-size:1rem;outline:none
}
.input-group input:focus{border-color:#22c55e}

.btn{
  width:100%;padding:16px;border:none;border-radius:12px;
  background:linear-gradient(135deg,#22c55e,#16a34a);color:#000;
  font-weight:700;font-size:1.1rem;cursor:pointer;margin-bottom:20px;transition:0.3s
}
.btn:hover{transform:translateY(-2px)}

.qr-wrapper{background:#fff;padding:20px;border-radius:15px;display:flex;justify-content:center;align-items:center;flex-direction:column;margin-bottom:15px;min-height:340px;color:#000;position:relative}
.qr-wrapper p{opacity:0.5}

.watermark{
  margin-top:12px;font-size:14px;color:#444;font-weight:700;
  letter-spacing:1px;text-align:center
}

.action-btns{display:flex;gap:10px}
.btn-secondary{
  flex:1;padding:12px;border:2px solid #22c55e;background:transparent;
  color:#22c55e;border-radius:10px;cursor:pointer;font-weight:600;display:none
}
.btn-secondary:hover{background:#22c55e;color:#000}
.tag{display:inline-block;background:rgba(34,197,94,0.2);padding:5px 12px;border-radius:20px;font-size:12px;margin-bottom:15px}
</style>
</head>
<body>

<div class="header">
  <a href="qr.html" class="back-btn">← Back</a>
  <h1>📱 Basic QR Generator</h1>
</div>

<div class="container">
  <span class="tag">Free Version</span>
  
  <div class="input-group">
    <label>Enter URL or Text</label>
    <input type="text" id="qrInput" placeholder="https://google.com or Hello World" onkeyup="generateQR()">
  </div>

  <button class="btn" onclick="generateQR()">Generate QR Code</button>

  <div id="qrWrapper" class="qr-wrapper">
    <p>Your QR will appear here</p>
  </div>
  
  <div class="action-btns">
    <button id="downloadBtn" class="btn-secondary" onclick="downloadPNG()">📥 Download with Watermark</button>
    <button id="copyBtn" class="btn-secondary" onclick="copyQR()">📋 Copy</button>
  </div>
</div>

<script>
let currentQRCanvas;
const BRAND_NAME = "Mujahar"; // Tor name

function generateQR(){
  const input = document.getElementById('qrInput').value;
  if(!input){
    document.getElementById('qrWrapper').innerHTML = '<p>Your QR will appear here</p>';
    document.getElementById('downloadBtn').style.display = 'none';
    document.getElementById('copyBtn').style.display = 'none';
    return;
  }
  
  document.getElementById('qrWrapper').innerHTML = '';
  
  QRCode.toCanvas(input, {
    width: 300,
    margin: 2,
    color: { dark: '#000', light: '#ffffff' }
  }, function (error, canvas) {
    if (error) console.error(error);
    
    currentQRCanvas = canvas;
    document.getElementById('qrWrapper').appendChild(canvas);
    
    // Watermark add
    const wm = document.createElement('div');
    wm.className = 'watermark';
    wm.innerText = `© ${BRAND_NAME}`;
    document.getElementById('qrWrapper').appendChild(wm);
    
    document.getElementById('downloadBtn').style.display = 'block';
    document.getElementById('copyBtn').style.display = 'block';
  });
}

function downloadPNG(){
  if(!currentQRCanvas) return;
  
  // Notun canvas banabo watermark soho
  const finalCanvas = document.createElement('canvas');
  const ctx = finalCanvas.getContext('2d');
  
  finalCanvas.width = 300;
  finalCanvas.height = 340; // QR + watermark er jonno extra height
  
  // White background
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);
  
  // QR draw
  ctx.drawImage(currentQRCanvas, 0, 0);
  
  // Watermark text draw
  ctx.fillStyle = '#444';
  ctx.font = 'bold 16px Poppins';
  ctx.textAlign = 'center';
  ctx.fillText(`© ${BRAND_NAME}`, finalCanvas.width/2, 325);
  
  // Download
  const link = document.createElement('a');
  link.download = 'qr-by-mujahar.png';
  link.href = finalCanvas.toDataURL();
  link.click();
}

function copyQR(){
  if(!currentQRCanvas) return;
  currentQRCanvas.toBlob(blob => {
    navigator.clipboard.write([new ClipboardItem({[blob.type]: blob})]);
    alert('QR Copied!');
  });
}
</script>

</body>
</html>
