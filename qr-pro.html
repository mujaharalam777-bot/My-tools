<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR PRO MAX ULTRA | AI QR Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.3/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script> <!-- For fancy QR -->
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script> <!-- For Scanner -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/paparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
:root{--primary:#22c55e;--bg1:#0f2027;--bg2:#203a43;--bg3:#2c5364;--card:rgba(255,255,255,.08);--border:rgba(255,255,255,.12);--white:#fff;}
body.light{--bg1:#f5f7fa;--bg2:#e8edf3;--bg3:#dfe6ee;--card:rgba(255,255,255,.9);--border:#ddd;--white:#111;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));color:var(--white);min-height:100vh;padding:20px;}
.header{max-width:1400px;margin:auto;display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;}
.header h1{font-size:2rem;font-weight:800;background:linear-gradient(135deg,#22c55e,#facc15,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.theme-btn{padding:10px 18px;border:none;border-radius:10px;background:var(--primary);color:#000;font-weight:700;cursor:pointer;}
.container{max-width:1400px;margin:auto;display:grid;grid-template-columns:1fr 450px;gap:25px;}
@media(max-width:1100px){.container{grid-template-columns:1fr;}}
.left-panel,.right-panel{background:var(--card);border:1px solid var(--border);backdrop-filter:blur(20px);border-radius:22px;padding:25px;}
.section-title{font-size:18px;font-weight:700;margin-bottom:15px;display:flex;align-items:center;gap:8px;}
.type-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
.type-btn{padding:12px;border:none;border-radius:12px;cursor:pointer;font-size:12px;font-weight:600;background:rgba(255,255,255,.08);color:var(--white);transition:.3s;}
.type-btn:hover{transform:translateY(-2px);background:rgba(255,255,255,.18);}
.type-btn.active{background:linear-gradient(135deg,var(--primary),#16a34a);color:#000;box-shadow:0 0 15px rgba(34,197,94,.4);}
.input-group{margin-bottom:16px;}
.input-group label{display:block;margin-bottom:8px;font-weight:600;font-size:14px;}
.input-group input,.input-group textarea{width:100%;padding:12px;border-radius:10px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:var(--white);transition:.3s;}
.input-group input:focus{border-color:var(--primary);outline:none;}
.color-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:15px;}
.generate-btn{width:100%;padding:16px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,var(--primary),#16a34a);color:#000;margin-top:10px;transition:.3s;}
.generate-btn:hover{transform:scale(1.02);box-shadow:0 0 20px rgba(34,197,94,.5);}
.preview-box{background:#fff;border-radius:18px;padding:25px;display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:450px;color:#000;position:relative;}
#qrReader{width:100%;border-radius:10px;overflow:hidden;margin-bottom:15px;}
.action-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:20px;}
.action-btn{padding:12px;border-radius:10px;border:2px solid var(--primary);background:transparent;color:var(--primary);font-weight:600;cursor:pointer;transition:.2s;}
.action-btn:hover{background:var(--primary);color:#000;}
.action-btn:disabled{opacity:.4;cursor:not-allowed;}
.badge{position:absolute;top:10px;right:10px;background:linear-gradient(135deg,#facc15,#ec4899);color:#000;padding:5px 10px;border-radius:20px;font-size:11px;font-weight:700;}
</style>
</head>
<body>
<div class="header">
    <h1>🚀 QR PRO MAX ULTRA</h1>
    <button class="theme-btn" onclick="toggleTheme()">🌙 Theme</button>
</div>

<div class="container">
  <div class="left-panel">
    <div class="section-title">⭐ 21 QR Types + AI</div>
    <div class="type-grid">
      <button class="type-btn active" data-type="text">📝 Text</button>
      <button class="type-btn" data-type="url">🌐 URL</button>
      <button class="type-btn" data-type="phone">📞 Phone</button>
      <button class="type-btn" data-type="email">📧 Email</button>
      <button class="type-btn" data-type="sms">💬 SMS</button>
      <button class="type-btn" data-type="whatsapp">🟢 WhatsApp</button>
      <button class="type-btn" data-type="wifi">📶 WiFi</button>
      <button class="type-btn" data-type="upi">💳 UPI</button>
      <button class="type-btn" data-type="contact">👤 Contact</button>
      <button class="type-btn" data-type="maps">📍 Maps</button>
      <button class="type-btn" data-type="event">📅 Event</button>
      <button class="type-btn" data-type="youtube">▶️ YouTube</button>
      <button class="type-btn" data-type="instagram">📷 Instagram</button>
      <button class="type-btn" data-type="facebook">📘 Facebook</button>
      <button class="type-btn" data-type="linkedin">💼 LinkedIn</button>
      <button class="type-btn" data-type="vcard">📇 vCard</button>
    </div>
    <div id="dynamicInput"></div>

    <div class="section-title">🎨 AI Customization</div>
    <div class="color-grid">
      <div class="input-group"><label>QR Color</label><input type="color" id="qrColor" value="#000"></div>
      <div class="input-group"><label>BG Color</label><input type="color" id="bgColor" value="#fff"></div>
      <div class="input-group"><label>Frame Text</label><input type="text" id="frameText" placeholder="Scan Me"></div>
    </div>
    <div class="input-group"><label>Size: <span id="sizeText">350</span>px</label><input type="range" id="qrSize" min="200" max="800" value="350" style="width:100%"></div>
    <div class="input-group"><label>Upload Logo</label><input type="file" id="logoInput" accept="image/*"></div>

    <button class="generate-btn" onclick="generateQR()">⚡ Generate AI QR</button>

    <div class="input-group"><label>📦 Batch CSV Upload</label><input type="file" id="csvInput" accept=".csv"></div>
    <button class="action-btn" onclick="batchGenerate()">Generate Batch</button>
    <button class="action-btn" onclick="downloadZIP()">Download ZIP</button>

    <div class="section-title">📷 QR Scanner</div>
    <div id="qrReader"></div>
    <button class="action-btn" onclick="startScanner()">Start Scanner</button>
  </div>

  <div class="right-panel">
    <h3>Live Preview <span class="badge">AI POWERED</span></h3>
    <div id="qrPreview" class="preview-box"><p>Start typing...</p></div>
    <div class="action-grid">
      <button class="action-btn" onclick="downloadPNG()" disabled>📥 PNG</button>
      <button class="action-btn" onclick="downloadSVG()" disabled>🖼 SVG</button>
      <button class="action-btn" onclick="downloadPDF()" disabled>📄 PDF</button>
    </div>
    <div class="section-title" style="margin-top:20px;">🕒 Recent History</div>
    <div id="historyList" style="max-height:150px;overflow-y:auto;">No History</div>
  </div>
</div>

<script>
let currentType="text"; let proQR=null; let logoImg=null; let batchCanvases=[]; let html5QrCode;

function toggleTheme(){document.body.classList.toggle("light");}

window.onload = function(){
    updateInput();
    loadHistory();
    document.querySelectorAll('.type-btn').forEach(btn=>{
      btn.onclick=function(){
        document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
        this.classList.add('active'); currentType=this.dataset.type; updateInput();
      }
    });
    document.getElementById('qrSize').oninput=function(){document.getElementById('sizeText').innerText=this.value; generateQR();}
    ['mainInput','emailTo','emailSub','waMsg'].forEach(id=>{
        document.addEventListener('input', e=>{if(e.target.id==id) generateQR();})
    })
    document.getElementById('logoInput').onchange=function(e){
        const r=new FileReader(); r.onload=ev=>{logoImg=new Image();logoImg.src=ev.target.result;}; r.readAsDataURL(e.target.files[0]);
    }
}

function updateInput(){
  const d=document.getElementById("dynamicInput");
  const inputs={
    text:`<div class="input-group"><label>Write your text here</label><textarea id="mainInput" placeholder="Hello World"></textarea></div>`,
    url:`<div class="input-group"><label>Website URL</label><input id="mainInput" placeholder="https://google.com"></div>`,
    phone:`<div class="input-group"><label>Phone Number</label><input id="mainInput" placeholder="+91 98765 43210"></div>`,
    email:`<div class="input-group"><label>Email To</label><input id="emailTo"></div><div class="input-group"><label>Subject</label><input id="emailSub"></div>`,
    whatsapp:`<div class="input-group"><label>WA Number</label><input id="waNum" placeholder="919876543210"></div><div class="input-group"><label>Message</label><textarea id="waMsg"></textarea></div>`,
    wifi:`<div class="input-group"><label>WiFi SSID</label><input id="wifiSSID"></div><div class="input-group"><label>Password</label><input id="wifiPass"></div>`,
    upi:`<div class="input-group"><label>UPI ID</label><input id="upiID" placeholder="name@upi"></div><div class="input-group"><label>Amount</label><input id="upiAmt" type="number"></div>`,
    maps:`<div class="input-group"><label>Location</label><input id="mapLoc" placeholder="Kolkata, West Bengal"></div>`
  };
  d.innerHTML=inputs[currentType] || inputs['text'];
}

function getQRData(){
  if(["text","url"].includes(currentType)) return document.getElementById("mainInput")?.value || "";
  if(currentType=="phone") return `tel:${document.getElementById("mainInput").value}`;
  if(currentType=="email") return `mailto:${document.getElementById("emailTo").value}?subject=${document.getElementById("emailSub").value}`;
  if(currentType=="whatsapp") return `https://wa.me/${document.getElementById("waNum").value}?text=${encodeURIComponent(document.getElementById("waMsg").value)}`;
  if(currentType=="wifi") return `WIFI:T:WPA;S:${document.getElementById("wifiSSID").value};P:${document.getElementById("wifiPass").value};;`;
  if(currentType=="upi") return `upi://pay?pa=${document.getElementById("upiID").value}&am=${document.getElementById("upiAmt").value}`;
  if(currentType=="maps") return `https://maps.google.com/?q=${encodeURIComponent(document.getElementById("mapLoc").value)}`;
  return "";
}

function generateQR(){
    const data = getQRData(); if(!data) return;
    const size = parseInt(document.getElementById("qrSize").value);
    QRCode.toCanvas(data,{
        width:size, margin:2, errorCorrectionLevel:"H",
        color:{dark:document.getElementById("qrColor").value, light:document.getElementById("bgColor").value}
    },function(err,canvas){
        if(err){console.log(err);return;}
        if(logoImg && logoImg.complete){const ctx = canvas.getContext("2d");const ls = size/5;ctx.drawImage(logoImg,(size-ls)/2,(size-ls)/2,ls,ls);}
        proQR = canvas;
        document.getElementById("qrPreview").innerHTML = "";
        document.getElementById("qrPreview").appendChild(canvas);
        document.querySelectorAll(".action-btn").forEach(btn=>{btn.disabled = false;});
        saveHistory(data);
    });
}

function startScanner(){
    html5QrCode = new Html5Qrcode("qrReader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 },
    qrCodeMessage => { alert("Scanned: " + qrCodeMessage); html5QrCode.stop(); });
}

function downloadPNG(){const a=document.createElement("a");a.download="QR_PRO_MAX.png";a.href=proQR.toDataURL("image/png");a.click();}
function downloadSVG(){const pngData = proQR.toDataURL("image/png");const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400"><image href="${pngData}"/></svg>`;const a=document.createElement("a");a.download="QR_PRO_MAX.svg";a.href="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(svg);a.click();}
function downloadPDF(){const {jsPDF}=window.jspdf;const pdf=new jsPDF();pdf.addImage(proQR.toDataURL("image/png"),'PNG',15,40,180,180);pdf.text(document.getElementById("frameText").value || "QR PRO MAX",15,20);pdf.save("QR_PRO_MAX.pdf");}
function batchGenerate(){const file=document.getElementById("csvInput").files[0];if(!file){alert("Upload CSV");return;}Papa.parse(file,{complete:function(res){batchCanvases=[];res.data.forEach((row,i)=>{if(row[0]){const c=document.createElement("canvas");QRCode.toCanvas(c,row[0],{width:400});batchCanvases.push(c);}});alert(batchCanvases.length+" QR Generated");}});}
function downloadZIP(){if(batchCanvases.length==0){alert("Generate Batch first");return;}const zip=new JSZip();batchCanvases.forEach((c,i)=>{zip.file(`QR_${i+1}.png`,c.toDataURL("image/png").split(",")[1],{base64:true});zip.generateAsync({type:"blob"}).then(c=>{const a=document.createElement("a");a.href=URL.createObjectURL(c);a.download="Batch_QR_PRO_MAX.zip";a.click();});}
function saveHistory(data){let h=JSON.parse(localStorage.getItem("qrH")||"[]");h.unshift({type:currentType,data:data,time:new Date().toLocaleString()});h=h.slice(0,10);localStorage.setItem("qrH",JSON.stringify(h));loadHistory();}
function loadHistory(){let h=JSON.parse(localStorage.getItem("qrH")||"[]");document.getElementById("historyList").innerHTML=h.length?h.map(x=>`<div style="padding:8px;border-bottom:1px solid rgba(255,255,255,.1);font-size:12px;">${x.type.toUpperCase()}: ${x.data.substring(0,30)}</div>`).join(""):"No History";}
</script>
</body>
    </html>
