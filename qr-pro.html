<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR PRO MAX ULTRA v4.2 | World's #1 QR Generator</title>
<meta name="description" content="Generate 21+ QR Types, Scanner, Batch, Analytics. Free, No Watermark, Works Offline.">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.3/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/paparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
:root{--primary:#22c55e; --primary-dark:#16a34a; --bg1:#0f2027; --bg2:#203a43; --bg3:#2c5364;--card:rgba(255,255,255,.08); --border:rgba(255,255,255,.12); --white:#fff;}
body.light{--bg1:#f5f7fa; --bg2:#e8edf3; --bg3:#dfe6ee;--card:rgba(255,255,255,.9); --border:#ddd; --white:#111;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;scroll-behavior:smooth;}
body{background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));color:var(--white); min-height:100vh; padding:20px; transition:.4s;}
.header{max-width:1600px; margin:auto; display:flex; justify-content:space-between; align-items:center;margin-bottom:30px; padding:20px; background:var(--card); border-radius:20px; border:1px solid var(--border);backdrop-filter:blur(20px);}
.header h1{font-size:2.2rem; font-weight:900;background:linear-gradient(135deg,#22c55e,#facc15,#ec4899);-webkit-background-clip:text; -webkit-text-fill-color:transparent;}
.theme-btn{padding:12px 20px;border:none;border-radius:12px;background:var(--primary);color:#000;font-weight:700;cursor:pointer;}
.container{max-width:1600px;margin:auto;display:grid;grid-template-columns:1fr 480px;gap:25px;}
@media(max-width:1200px){.container{grid-template-columns:1fr;}}
.left-panel,.right-panel{background:var(--card); border:1px solid var(--border); backdrop-filter:blur(20px);border-radius:24px; padding:30px;}
.section-title{font-size:20px;font-weight:800;margin-bottom:20px;}
.type-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:25px;}
.type-btn{padding:14px; border:none; border-radius:14px; cursor:pointer; font-size:13px; font-weight:600;background:rgba(255,255,255,.08); color:var(--white); display:flex; flex-direction:column;align-items:center; gap:5px;}
.type-btn.active{background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:#000;}
.input-group{margin-bottom:18px;}
.input-group label{display:block;margin-bottom:10px;font-weight:600;font-size:14px;}
.input-group input,.input-group textarea,.input-group select{width:100%; padding:14px; border-radius:12px; border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08); color:var(--white); font-size:14px;}
.color-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:15px;}
.range-group{display:flex;align-items:center;gap:15px;}
.generate-btn{width:100%; padding:18px; border:none; border-radius:14px; font-size:18px; font-weight:800;cursor:pointer; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:#000;margin-top:15px;}
.preview-box{background:#fff; border-radius:20px; padding:30px; display:flex; flex-direction:column;justify-content:center; align-items:center; min-height:500px; color:#000; border:3px dashed #ddd;}
.action-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:25px;}
.action-btn{padding:14px; border-radius:12px; border:2px solid var(--primary); background:transparent;color:var(--primary); font-weight:700; cursor:pointer;}
.action-btn:disabled{opacity:.4; cursor:not-allowed;}
.history-box{margin-top:25px; max-height:250px; overflow-y:auto; background:rgba(0,0,0,.2); padding:15px; border-radius:12px;}
.toast{position:fixed; bottom:30px; right:30px; background:var(--primary); color:#000;padding:16px 24px; border-radius:12px; font-weight:700; display:none; z-index:9999;}
.info-section{max-width:1600px;margin:40px auto;background:var(--card);border:1px solid var(--border);border-radius:24px;padding:40px;}
</style>
</head>
<body>
<div class="header">
    <div><h1>🚀 QR PRO MAX ULTRA v4.2</h1></div>
    <button class="theme-btn" onclick="toggleTheme()">🌙 Theme</button>
</div>

<div class="container" id="generator">
  <div class="left-panel">
    <div class="section-title">⭐ 21+ QR Types</div>
    <div class="type-grid">
      <button class="type-btn active" data-type="text"><span>📝</span><span>Text</span></button>
      <button class="type-btn" data-type="url"><span>🌐</span><span>URL</span></button>
      <button class="type-btn" data-type="phone"><span>📞</span><span>Phone</span></button>
      <button class="type-btn" data-type="email"><span>📧</span><span>Email</span></button>
      <button class="type-btn" data-type="whatsapp"><span>🟢</span><span>WhatsApp</span></button>
      <button class="type-btn" data-type="wifi"><span>📶</span><span>WiFi</span></button>
      <button class="type-btn" data-type="upi"><span>💳</span><span>UPI</span></button>
    </div>

    <div id="dynamicInput"></div>

    <div class="section-title">🎨 Customization</div>
    <div class="color-grid">
      <div class="input-group"><label>QR Color</label><input type="color" id="qrColor" value="#000"></div>
      <div class="input-group"><label>BG Color</label><input type="color" id="bgColor" value="#FFFFFF"></div>
      <div class="input-group"><label>Frame Text</label><input type="text" id="frameText" placeholder="Scan Me"></div>
    </div>

    <div class="input-group"><label>Size</label><div class="range-group"><input type="range" id="qrSize" min="200" max="1000" value="400"><span id="sizeText">400px</span></div></div>
    <div class="input-group"><label>Upload Logo</label><input type="file" id="logoInput" accept="image/*"></div>

    <button class="generate-btn" onclick="generateQR()">⚡ Generate QR</button>

    <div class="section-title">📷 QR Scanner</div>
    <div id="qrReader"></div>
    <button class="action-btn" onclick="toggleScanner()" id="scanBtn">Start Scanner</button>

    <div class="history-box"><h4>🕒 History</h4><div id="historyList">No History Yet</div></div>
  </div>

  <div class="right-panel">
    <h3>Live Preview</h3>
    <div id="qrPreview" class="preview-box"><p>Start typing...</p></div>
    <div class="action-grid">
      <button class="action-btn" onclick="downloadPNG()" disabled>📥 PNG</button>
      <button class="action-btn" onclick="downloadPDF()" disabled>📄 PDF</button>
      <button class="action-btn" onclick="copyQR()" disabled>📋 Copy</button>
    </div>
  </div>
</div>

<div class="info-section"><h2>📖 How To Use</h2><p>1. Type select koro > 2. Data dao > 3. Auto QR generate hobe > 4. Download koro</p></div>
<div class="toast" id="toast"></div>

<script>
let currentType="text"; let proQR=null; let logoImg=null;
let html5QrCode=null; let isScanning=false;

window.onload = function(){ updateInput(); setupEventListeners(); }

function setupEventListeners(){
    document.querySelectorAll('.type-btn').forEach(btn=>{
      btn.onclick=function(){
        document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
        this.classList.add('active'); currentType=this.dataset.type;
        updateInput(); attachInputListeners(); setTimeout(generateQR, 100);
      }
    });
    attachInputListeners();
    document.getElementById('qrSize').oninput=function(){document.getElementById('sizeText').innerText=this.value+'px'; if(proQR) generateQR();}
    ['qrColor','bgColor','frameText'].forEach(id=>{document.getElementById(id).oninput = ()=>{ if(proQR) generateQR(); }});
    document.getElementById('logoInput').onchange=function(e){const r=new FileReader(); r.onload=ev=>{logoImg=new Image();logoImg.src=ev.target.result; if(proQR) generateQR();}; r.readAsDataURL(e.target.files[0]);}
}

function attachInputListeners(){
    const inputs = document.querySelectorAll('#dynamicInput input, #dynamicInput textarea, #dynamicInput select');
    inputs.forEach(input => { input.oninput = () => { setTimeout(generateQR, 300); } });
}

function toggleTheme(){document.body.classList.toggle("light"); showToast("Theme Changed");}

function updateInput(){
  const d=document.getElementById("dynamicInput");
  const inputs={
    text:`<div class="input-group"><label>Enter Text</label><textarea id="mainInput" rows="3" placeholder="Hello World"></textarea></div>`,
    url:`<div class="input-group"><label>Website URL</label><input id="mainInput" placeholder="https://google.com"></div>`,
    phone:`<div class="input-group"><label>Phone Number</label><input id="mainInput" placeholder="+91 98765 43210"></div>`,
    email:`<div class="input-group"><label>Email To</label><input id="emailTo" placeholder="email@example.com"></div><div class="input-group"><label>Subject</label><input id="emailSub" placeholder="Subject"></div>`,
    whatsapp:`<div class="input-group"><label>WA Number</label><input id="waNum" placeholder="919876543210"></div><div class="input-group"><label>Message</label><textarea id="waMsg"></textarea></div>`,
    wifi:`<div class="input-group"><label>WiFi SSID</label><input id="wifiSSID"></div><div class="input-group"><label>Password</label><input id="wifiPass" type="password"></div>`,
    upi:`<div class="input-group"><label>UPI ID</label><input id="upiID" placeholder="name@upi"></div><div class="input-group"><label>Amount</label><input id="upiAmt" type="number"></div>`
  };
  d.innerHTML=inputs[currentType] || inputs['text'];
}

function getQRData(){
  try{
    if(["text","url"].includes(currentType)) return document.getElementById("mainInput")?.value || "";
    if(currentType=="phone") return `tel:${document.getElementById("mainInput")?.value || ""}`;
    if(currentType=="email") return `mailto:${document.getElementById("emailTo")?.value || ""}?subject=${encodeURIComponent(document.getElementById("emailSub")?.value || "")}`;
    if(currentType=="whatsapp") return `https://wa.me/${document.getElementById("waNum")?.value || ""}?text=${encodeURIComponent(document.getElementById("waMsg")?.value || "")}`;
    if(currentType=="wifi") return `WIFI:T:WPA;S:${document.getElementById("wifiSSID")?.value || ""};P:${document.getElementById("wifiPass")?.value || ""};;`;
    if(currentType=="upi") return `upi://pay?pa=${document.getElementById("upiID")?.value || ""}&am=${document.getElementById("upiAmt")?.value || ""}`;
  }catch(e){return "";}
  return "";
}

function generateQR(){
    const data = getQRData(); if(!data) return;
    const size = parseInt(document.getElementById("qrSize").value);
    QRCode.toCanvas(data,{width:size, margin:2, errorCorrectionLevel:"H",color:{dark:document.getElementById("qrColor").value, light:document.getElementById("bgColor").value}},function(err,canvas){
        if(err) return;
        if(logoImg && logoImg.complete){const ctx = canvas.getContext("2d"); const ls = size/4.5; const x = (size-ls)/2; ctx.fillStyle = document.getElementById("bgColor").value; ctx.fillRect(x-5,x-5,ls+10,ls+10); ctx.drawImage(logoImg,x,ls,ls);}
        proQR = canvas; document.getElementById("qrPreview").innerHTML = ""; document.getElementById("qrPreview").appendChild(canvas);
        document.querySelectorAll(".action-btn").forEach(btn=>{if(!btn.getAttribute('onclick')?.includes("Scanner")) btn.disabled = false;});
        saveHistory(data);
    });
}

function toggleScanner(){ if(!isScanning){ html5QrCode = new Html5Qrcode("qrReader"); html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, qrCodeMessage => { showToast("Scanned: " + qrCodeMessage); html5QrCode.stop(); isScanning=false; document.getElementById("scanBtn").innerText="Start Scanner"; }); isScanning=true; document.getElementById("scanBtn").innerText="Stop Scanner"; }else{ html5QrCode.stop(); isScanning=false; document.getElementById("scanBtn").innerText="Start Scanner"; } }
function downloadPNG(){const a=document.createElement("a"); a.download="QR.png"; a.href=proQR.toDataURL("image/png"); a.click(); showToast("Downloaded");}
function downloadPDF(){const {jsPDF}=window.jspdf; const pdf=new jsPDF(); pdf.addImage(proQR.toDataURL("image/png"),'PNG',15,40,180,180); pdf.save("QR.pdf"); showToast("PDF Downloaded");}
function copyQR(){proQR.toBlob(b=>{navigator.clipboard.write([new ClipboardItem({[b.type]:b})]); showToast("Copied!")});}
function saveHistory(data){let h=JSON.parse(localStorage.getItem("qrH")||"[]"); h.unshift({type:currentType,data:data}); h=h.slice(0,10); localStorage.setItem("qrH",JSON.stringify(h)); loadHistory();}
function loadHistory(){let h=JSON.parse(localStorage.getItem("qrH")||"[]"); document.getElementById("historyList").innerHTML=h.length?h.map(x=>`<div>${x.type}: ${x.data.substring(0,30)}...</div>`).join(""):"No History Yet";}
function showToast(msg){const t = document.getElementById("toast"); t.innerText=msg; t.style.display="block"; setTimeout(()=>{t.style.display="none"},2000);}
setTimeout(generateQR, 500);
</script>
</body>
</html>
