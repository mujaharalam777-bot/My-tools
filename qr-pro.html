<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR PRO MAX ULTRA v5.0 | 1000% Working</title>
<meta name="description" content="21+ QR Types, Live Generate, Scanner, Batch, Download, History. 100% Free">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.3/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/paparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
:root{
    --primary:#22c55e; --primary-dark:#16a34a; --secondary:#facc15; --accent:#ec4899;
    --bg1:#0f2027; --bg2:#203a43; --bg3:#2c5364;
    --card:rgba(255,255,255,.08); --border:rgba(255,255,255,.12); --white:#fff;
    --shadow:0 8px 32px rgba(0,0,0,.3);
}
body.light{
    --bg1:#f5f7fa; --bg2:#e8edf3; --bg3:#dfe6ee;
    --card:rgba(255,255,255,.9); --border:#ddd; --white:#111; --shadow:0 8px 32px rgba(0,0,0,.1);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;scroll-behavior:smooth;}
body{background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));color:var(--white); min-height:100vh; padding:20px; transition:.4s;}
.header{max-width:1600px; margin:auto; display:flex; justify-content:space-between; align-items:center;margin-bottom:30px; padding:20px; background:var(--card); border-radius:20px; border:1px solid var(--border);backdrop-filter:blur(20px); box-shadow:var(--shadow);}
.header h1{font-size:2.2rem; font-weight:900;background:linear-gradient(135deg,#22c55e,#facc15,#ec4899);-webkit-background-clip:text; -webkit-text-fill-color:transparent;}
.theme-btn{padding:12px 20px;border:none;border-radius:12px;background:var(--primary);color:#000;font-weight:700;cursor:pointer;transition:.3s;}
.theme-btn:hover{transform:scale(1.05); box-shadow:0 0 20px var(--primary);}
.container{max-width:1600px;margin:auto;display:grid;grid-template-columns:1fr 480px;gap:25px;}
@media(max-width:1200px){.container{grid-template-columns:1fr;}}
.left-panel,.right-panel{background:var(--card); border:1px solid var(--border); backdrop-filter:blur(20px);border-radius:24px; padding:30px; box-shadow:var(--shadow);}
.section-title{font-size:20px;font-weight:800;margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.type-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:25px;}
@media(max-width:700px){.type-grid{grid-template-columns:repeat(3,1fr);}}
.type-btn{padding:14px; border:none; border-radius:14px; cursor:pointer; font-size:13px; font-weight:600;background:rgba(255,255,255,.08); color:var(--white); transition:.3s; display:flex; flex-direction:column;align-items:center; gap:5px;}
.type-btn:hover{transform:translateY(-3px); background:rgba(255,255,255,.15);}
.type-btn.active{background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:#000;box-shadow:0 0 20px rgba(34,197,94,.4); transform:scale(1.05);}
.input-group{margin-bottom:18px;}
.input-group label{display:block;margin-bottom:10px;font-weight:600;font-size:14px;opacity:.9;}
.input-group input,.input-group textarea,.input-group select{width:100%; padding:14px; border-radius:12px; border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08); color:var(--white); font-size:14px; transition:.3s;}
.input-group input:focus{border-color:var(--primary); outline:none; background:rgba(255,255,255,.12);}
.color-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:15px;}
.range-group{display:flex;align-items:center;gap:15px;}
.range-group span{min-width:60px; font-weight:700; color:var(--primary);}
input[type="range"]{width:100%; accent-color:var(--primary);}
.generate-btn{width:100%; padding:18px; border:none; border-radius:14px; font-size:18px; font-weight:800;cursor:pointer; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:#000;margin-top:15px; transition:.3s; box-shadow:0 4px 15px rgba(34,197,94,.3);}
.generate-btn:hover{transform:translateY(-2px); box-shadow:0 8px 25px rgba(34,197,94,.5);}
.preview-box{background:#fff; border-radius:20px; padding:30px; display:flex; flex-direction:column;justify-content:center; align-items:center; min-height:500px; color:#000; position:relative;border:3px dashed #ddd;}
.badge{position:absolute; top:15px; right:15px; background:linear-gradient(135deg,#facc15,#ec4899);color:#000; padding:6px 12px; border-radius:20px; font-size:11px; font-weight:800;}
#qrReader{width:100%; border-radius:12px; overflow:hidden; margin-bottom:15px;}
.action-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:25px;}
.action-btn{padding:14px; border-radius:12px; border:2px solid var(--primary); background:transparent;color:var(--primary); font-weight:700; cursor:pointer; transition:.3s;}
.action-btn:hover{background:var(--primary); color:#000; transform:translateY(-2px);}
.action-btn:disabled{opacity:.4; cursor:not-allowed; transform:none;}
.history-box{margin-top:25px; max-height:250px; overflow-y:auto; background:rgba(0,0,0,.2); padding:15px; border-radius:12px;}
.history-item{padding:12px; border-bottom:1px solid rgba(255,255,255,.1); font-size:13px; cursor:pointer;transition:.2s; border-radius:8px; margin-bottom:5px;}
.history-item:hover{background:rgba(255,255,255,.1);}
.footer{text-align:center;padding:30px;opacity:.6;font-size:14px;}
.loader{display:none; border:3px solid rgba(255,255,255,.3); border-top:3px solid var(--primary); border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite;margin:auto;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
.toast{position:fixed; bottom:30px; right:30px; background:var(--primary); color:#000;padding:16px 24px; border-radius:12px; font-weight:700; display:none; z-index:9999;box-shadow:0 8px 25px rgba(34,197,94,.4);}
</style>
</head>
<body>
<div class="header">
    <div><h1>🚀 QR PRO MAX ULTRA v5.0</h1></div>
    <button class="theme-btn" onclick="toggleTheme()">🌙 Theme</button>
</div>

<div class="container" id="generator">
  <div class="left-panel">
    <div class="section-title">⭐ 21+ QR Types</div>
    <div class="type-grid">
      <button class="type-btn active" data-type="text"><span>📝</span><span>Text</span></button>
      <button class="type-btn" data-type="url"><span>🌐</span><span>URL</span></button>
      <button class="type-btn" data-type="phone"><span>📞</span><span>Phone</span></button>
      <button class="type-btn" data-type="email"><span>📧</span><span>Email</span></button>
      <button class="type-btn" data-type="sms"><span>💬</span><span>SMS</span></button>
      <button class="type-btn" data-type="whatsapp"><span>🟢</span><span>WhatsApp</span></button>
      <button class="type-btn" data-type="wifi"><span>📶</span><span>WiFi</span></button>
      <button class="type-btn" data-type="upi"><span>💳</span><span>UPI</span></button>
    </div>

    <div id="dynamicInput"></div>

    <div class="section-title">🎨 Customization</div>
    <div class="color-grid">
      <div class="input-group"><label>QR Color</label><input type="color" id="qrColor" value="#000"></div>
      <div class="input-group"><label>BG Color</label><input type="color" id="bgColor" value="#FFFFFF"></div>
      <div class="input-group"><label>Frame Text</label><input type="text" id="frameText" placeholder="Scan Me"></div>
    </div>

    <div class="input-group">
        <label>Size Control</label>
        <div class="range-group">
            <input type="range" id="qrSize" min="200" max="1000" value="400">
            <span id="sizeText">400px</span>
        </div>
    </div>

    <div class="input-group"><label>Upload Logo</label><input type="file" id="logoInput" accept="image/*"></div>

    <button class="generate-btn" onclick="generateQR()">
        <span id="btnText">⚡ Generate QR</span>
        <div class="loader" id="loader"></div>
    </button>

    <div class="section-title">📷 QR Scanner</div>
    <div id="qrReader"></div>
    <button class="action-btn" onclick="toggleScanner()" id="scanBtn">Start Scanner</button>

    <div class="history-box">
        <h4>🕒 Recent History</h4>
        <div id="historyList">No History Yet</div>
        <button class="action-btn" onclick="clearHistory()" style="width:100%;margin-top:10px;">Clear History</button>
    </div>
  </div>

  <div class="right-panel">
    <h3>Live Preview <span class="badge">PRO</span></h3>
    <div id="qrPreview" class="preview-box"><p style="opacity:.5;">Start typing to see live QR...</p></div>

    <div class="action-grid">
      <button class="action-btn" onclick="downloadPNG()" disabled>📥 PNG</button>
      <button class="action-btn" onclick="downloadSVG()" disabled>🖼 SVG</button>
      <button class="action-btn" onclick="downloadPDF()" disabled>📄 PDF</button>
      <button class="action-btn" onclick="copyQR()" disabled>📋 Copy</button>
      <button class="action-btn" onclick="shareQR()" disabled>🔗 Share</button>
      <button class="action-btn" onclick="printQR()" disabled>🖨 Print</button>
    </div>
  </div>
</div>

<div class="footer">© 2026 QR PRO MAX ULTRA v5.0 | 100% Private & Offline</div>
<div class="toast" id="toast"></div>

<script>
let currentType="text"; let proQR=null; let logoImg=null;
let html5QrCode=null; let isScanning=false;

window.onload = function(){
    updateInput(); loadHistory(); setupEventListeners();
    setTimeout(generateQR, 500);
}

function setupEventListeners(){
    document.querySelectorAll('.type-btn').forEach(btn=>{
      btn.onclick=function(){
        document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
        this.classList.add('active'); currentType=this.dataset.type;
        updateInput(); attachInputListeners(); setTimeout(generateQR, 100);
      }
    });
    attachInputListeners();
    document.getElementById('qrSize').oninput=function(){
        document.getElementById('sizeText').innerText=this.value+'px';
        if(proQR) generateQR();
    }
    ['qrColor','bgColor','frameText'].forEach(id=>{
        document.getElementById(id).oninput = ()=>{ if(proQR) generateQR(); }
    });
    document.getElementById('logoInput').onchange=function(e){
        const r=new FileReader();
        r.onload=ev=>{logoImg=new Image();logoImg.src=ev.target.result; if(proQR) generateQR();};
        r.readAsDataURL(e.target.files[0]);
    }
}

function attachInputListeners(){
    const inputs = document.querySelectorAll('#dynamicInput input, #dynamicInput textarea, #dynamicInput select');
    inputs.forEach(input => {
        input.oninput = () => { setTimeout(generateQR, 300); }
    });
}

function toggleTheme(){document.body.classList.toggle("light"); showToast("Theme Changed");}

function updateInput(){
  const d=document.getElementById("dynamicInput");
  const inputs={
    text:`<div class="input-group"><label>Enter Text</label><textarea id="mainInput" rows="3" placeholder="Hello World"></textarea></div>`,
    url:`<div class="input-group"><label>Website URL</label><input id="mainInput" placeholder="https://google.com"></div>`,
    phone:`<div class="input-group"><label>Phone Number</label><input id="mainInput" placeholder="+91 98765 43210"></div>`,
    email:`<div class="input-group"><label>Email To</label><input id="emailTo" placeholder="email@example.com"></div><div class="input-group"><label>Subject</label><input id="emailSub" placeholder="Subject"></div>`,
    sms:`<div class="input-group"><label>Phone Number</label><input id="smsNum" placeholder="+91..."></div><div class="input-group"><label>Message</label><textarea id="smsMsg"></textarea></div>`,
    whatsapp:`<div class="input-group"><label>WA Number with Country Code</label><input id="waNum" placeholder="919876543210"></div><div class="input-group"><label>Message</label><textarea id="waMsg"></textarea></div>`,
    wifi:`<div class="input-group"><label>WiFi Name SSID</label><input id="wifiSSID"></div><div class="input-group"><label>Password</label><input id="wifiPass" type="password"></div><div class="input-group"><label>Encryption</label><select id="wifiEnc"><option>WPA</option><option>WEP</option><option>NOPASS</option></select></div>`,
    upi:`<div class="input-group"><label>UPI ID</label><input id="upiID" placeholder="name@upi"></div><div class="input-group"><label>Amount ₹</label><input id="upiAmt" type="number"></div><div class="input-group"><label>Note</label><input id="upiNote" placeholder="Payment"></div>`,
    contact:`<div class="input-group"><label>Full Name</label><input id="cName"></div><div class="input-group"><label>Phone</label><input id="cPhone"></div><div class="input-group"><label>Email</label><input id="cEmail"></div>`,
    maps:`<div class="input-group"><label>Location Address</label><input id="mapLoc" placeholder="Kolkata, West Bengal"></div>`,
    event:`<div class="input-group"><label>Event Name</label><input id="eventName"></div><div class="input-group"><label>Date</label><input id="eventDate" type="date"></div><div class="input-group"><label>Location</label><input id="eventLoc"></div>`,
    youtube:`<div class="input-group"><label>YouTube Video URL</label><input id="mainInput"></div>`,
    instagram:`<div class="input-group"><label>Instagram Username</label><input id="mainInput" placeholder="@username"></div>`,
    facebook:`<div class="input-group"><label>Facebook Profile URL</label><input id="mainInput"></div>`,
    linkedin:`<div class="input-group"><label>LinkedIn Profile URL</label><input id="mainInput"></div>`,
    twitter:`<div class="input-group"><label>Twitter Username</label><input id="mainInput" placeholder="@username"></div>`,
    paypal:`<div class="input-group"><label>PayPal.me Link</label><input id="mainInput"></div>`,
    bitcoin:`<div class="input-group"><label>Bitcoin Wallet Address</label><input id="mainInput"></div>`,
    zoom:`<div class="input-group"><label>Zoom Meeting Link</label><input id="mainInput"></div>`,
    facetime:`<div class="input-group"><label>FaceTime Email or Number</label><input id="mainInput"></div>`,
    vcard:`<div class="input-group"><label>Full Name</label><input id="vName"></div><div class="input-group"><label>Phone</label><input id="vPhone"></div><div class="input-group"><label>Email</label><input id="vEmail"></div><div class="input-group"><label>Company</label><input id="vCompany"></div>`
  };
  d.innerHTML=inputs[currentType] || inputs['text'];
}

function getQRData(){
  try{
    if(["text","url","youtube","instagram","facebook","linkedin","twitter","paypal","bitcoin","zoom","facetime"].includes(currentType))
        return document.getElementById("mainInput")?.value || "";
    if(currentType=="phone") return `tel:${document.getElementById("mainInput")?.value || ""}`;
    if(currentType=="email") return `mailto:${document.getElementById("emailTo")?.value || ""}?subject=${encodeURIComponent(document.getElementById("emailSub")?.value || "")}`;
    if(currentType=="sms") return `SMSTO:${document.getElementById("smsNum")?.value || ""}:${document.getElementById("smsMsg")?.value || ""}`;
    if(currentType=="whatsapp") return `https://wa.me/${document.getElementById("waNum")?.value || ""}?text=${encodeURIComponent(document.getElementById("waMsg")?.value || "")}`;
    if(currentType=="wifi") {
        const enc = document.getElementById("wifiEnc")?.value || "WPA";
        return `WIFI:T:${enc};S:${document.getElementById("wifiSSID")?.value || ""};P:${document.getElementById("wifiPass")?.value || ""};;`;
    }
    if(currentType=="upi") return `upi://pay?pa=${document.getElementById("upiID")?.value || ""}&pn=Payment&am=${document.getElementById("upiAmt")?.value || ""}&tn=${document.getElementById("upiNote")?.value || ""}`;
    if(currentType=="contact") return `BEGIN:VCARD\nFN:${document.getElementById("cName")?.value || ""}\nTEL:${document.getElementById("cPhone")?.value || ""}\nEMAIL:${document.getElementById("cEmail")?.value || ""}\nEND:VCARD`;
    if(currentType=="maps") return `https://maps.google.com/?q=${encodeURIComponent(document.getElementById("mapLoc")?.value || "")}`;
    if(currentType=="event") return `BEGIN:VEVENT\nSUMMARY:${document.getElementById("eventName")?.value || ""}\nDTSTART:${document.getElementById("eventDate")?.value || ""}\nLOCATION:${document.getElementById("eventLoc")?.value || ""}\nEND:VEVENT`;
    if(currentType=="vcard") return `BEGIN:VCARD\nFN:${document.getElementById("vName")?.value || ""}\nTEL:${document.getElementById("vPhone")?.value || ""}\nEMAIL:${document.getElementById("vEmail")?.value || ""}\nORG:${document.getElementById("vCompany")?.value || ""}\nEND:VCARD`;
  }catch(e){console.log(e); return "";}
  return "";
}

async function generateQR(){
    const data = getQRData();
    if(!data) return;
    showLoader(true);
    const size = parseInt(document.getElementById("qrSize").value);

    QRCode.toCanvas(data,{
        width:size, margin:2, errorCorrectionLevel:"H",
        color:{ dark:document.getElementById("qrColor").value, light:document.getElementById("bgColor").value }
    },function(err,canvas){
        showLoader(false);
        if(err){showToast("Error: "+err); return;}
        if(logoImg && logoImg.complete){
            const ctx = canvas.getContext("2d");
            const ls = size/4.5;
            const x = (size-ls)/2;
            const y = (size-ls)/2;
            ctx.fillStyle = document.getElementById("bgColor").value;
            ctx.fillRect(x-5,y-5,ls+10,ls+10);
            ctx.drawImage(logoImg,x,y,ls,ls);
        }
        proQR = canvas;
        document.getElementById("qrPreview").innerHTML = "";
        document.getElementById("qrPreview").appendChild(canvas);
        const frameText = document.getElementById("frameText").value;
        if(frameText){
            const label = document.createElement("p");
            label.innerText = frameText;
            label.style.marginTop = "15px";
            label.style.fontWeight = "700";
            label.style.fontSize = "16px";
            label.style.color = "#000";
            document.getElementById("qrPreview").appendChild(label);
        }
        document.querySelectorAll(".action-btn").forEach(btn=>{
            if(!btn.getAttribute('onclick')?.includes("Scanner") &&!btn.getAttribute('onclick')?.includes("History"))
            btn.disabled = false;
        });
        saveHistory(data);
    });
}

function showLoader(show){
    document.getElementById("loader").style.display = show? "block" : "none";
    document.getElementById("btnText").style.display = show? "none" : "inline";
}

function toggleScanner(){
    if(!isScanning){
        html5QrCode = new Html5Qrcode("qrReader");
        html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: 250 },
            qrCodeMessage => {
                showToast("✅ Scanned: " + qrCodeMessage);
                navigator.clipboard.writeText(qrCodeMessage);
                if(document.getElementById("mainInput")) document.getElementById("mainInput").value = qrCodeMessage;
                generateQR();
                html5QrCode.stop();
                isScanning=false;
                document.getElementById("scanBtn").innerText="Start Scanner";
            },
            errorMessage => {}
        ).catch(err => {
            showToast("❌ Camera Error: " + err);
        });
        isScanning=true;
        document.getElementById("scanBtn").innerText="⏹ Stop Scanner";
    }else{
        html5QrCode.stop();
        isScanning=false;
        document.getElementById("scanBtn").innerText="📷 Start Scanner";
    }
}

function downloadPNG(){ const a=document.createElement("a"); a.download="QR_PRO_MAX.png"; a.href=proQR.toDataURL("image/png"); a.click(); showToast("✅ PNG Downloaded"); }
function downloadSVG(){ const pngData = proQR.toDataURL("image/png"); const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000"><image href="${pngData}" width="1000" height="1000"/></svg>`; const a=document.createElement("a"); a.download="QR_PRO_MAX.svg"; a.href="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(svg); a.click(); showToast("✅ SVG Downloaded"); }
function downloadPDF(){ const {jsPDF}=window.jspdf; const pdf=new jsPDF(); pdf.addImage(proQR.toDataURL("image/png"),'PNG',15,40,180,180); pdf.setFontSize(20); pdf.text(document.getElementById("frameText").value || "QR PRO MAX",105,20,{align:"center"}); pdf.save("QR_PRO_MAX.pdf"); showToast("✅ PDF Downloaded"); }
function copyQR(){ proQR.toBlob(b=>{ navigator.clipboard.write([new ClipboardItem({[b.type]:b})]); showToast("✅ QR Copied to Clipboard!") }).catch(()=>{showToast("❌ Copy Failed")}); }
function shareQR(){ if(navigator.share){ proQR.toBlob(b=>{ const file = new File([b], "qr.png", {type:b.type}); navigator.share({ files:[file], title:"QR PRO MAX", text:"Check this QR Code" }).catch(()=>{}); }); }else{ showToast("❌ Sharing not supported in this browser") } }
function printQR(){ const w = window.open(); w.document.write(`<html><body style="text-align:center"><img src="${proQR.toDataURL()}" onload="window.print();window.close()"></body></html>`); w.document.close(); }

function saveHistory(data){
    let h = JSON.parse(localStorage.getItem("qrH") || "[]");
    h = h.filter(item => item.data!== data);
    h.unshift({ type: currentType, data: data, time: new Date().toLocaleString('en-IN') });
    h = h.slice(0, 20);
    localStorage.setItem("qrH", JSON.stringify(h));
    loadHistory();
}

function loadHistory(){
    let h = JSON.parse(localStorage.getItem("qrH") || "[]");
    if(h.length === 0){
        document.getElementById("historyList").innerHTML = "No History Yet";
        return;
    }
    document.getElementById("historyList").innerHTML = h.map((x, index) =>
        `<div class="history-item" onclick="useHistory(${index})">
            <b>${x.type.toUpperCase()}</b>: ${x.data.substring(0,40)}...
            <br><small style="opacity:.6">${x.time}</small>
        </div>`
    ).join("");
}

function useHistory(index){
    let h = JSON.parse(localStorage.getItem("qrH") || "[]");
    const item = h[index];
    document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
    document.querySelector(`.type-btn[data-type="${item.type}"]`).classList.add('active');
    currentType = item.type;
    updateInput();
    attachInputListeners();
    setTimeout(()=>{ if(document.getElementById("mainInput")) document.getElementById("mainInput").value = item.data; generateQR(); }, 50);
    showToast("✅ Loaded from History");
}

function clearHistory(){
    if(confirm("Tui ki sotti sob history muche felte chas?")){
        localStorage.removeItem("qrH");
        loadHistory();
        showToast("🗑️ Sob History Cleared");
    }
}

function showToast(msg){
    const toast = document.createElement("div");
    toast.innerText = msg;
    toast.style.cssText = `
        position: fixed; top: 20px; right: 20px; background: #28a745; color: white;
        padding: 12px 20px; border-radius: 8px; font-weight: 600; z-index: 9999;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3); opacity: 0; transform: translateY(-20px);
        transition: all 0.3s ease;
    `;
    document.body.appendChild(toast);
    setTimeout(() => { toast.style.opacity = "1"; toast.style.transform = "translateY(0)"; }, 100);
    setTimeout(() => { toast.style.opacity = "0"; toast.style.transform = "translateY(-20px)"; setTimeout(() => toast.remove(), 300); }, 2000);
}
</script>
</body>
</html>
