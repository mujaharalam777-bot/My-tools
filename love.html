<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Calculator | Free</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{
  background:linear-gradient(135deg,#ff758c,#ff7eb3,#ff9a9e);
  color:white;
  min-height:100vh;
  padding:30px 20px;
  overflow-x:hidden;
}
.container{max-width:650px;margin:auto;}
.back{color:#ffe4ec;text-decoration:none;font-size:16px;margin-bottom:20px;display:inline-block;}
.back:hover{color:white;}

.header{text-align:center;margin-bottom:30px;}
.header img{width:60px;margin-bottom:10px;filter: drop-shadow(0 0 10px #fff);}
.header h1{font-size:28px;font-weight:800;text-shadow:0 2px 10px rgba(0,0,0,0.2);}

/* Floating hearts */
.heart{
  position:fixed;
  font-size:20px;
  animation:float 6s linear infinite;
  opacity:0.3;
}
@keyframes float{
 0%{transform:translateY(100vh) rotate(0deg);}
 100%{transform:translateY(-10vh) rotate(360deg);}
}

.card{
  background:rgba(255,255,255,.15);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.2);
  border-radius:22px;
  padding:30px;
  margin-bottom:20px;
  text-align:center;
  box-shadow:0 8px 32px rgba(255,0,100,0.2);
}
.card-header{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;}
.dot{width:12px;height:12px;border-radius:50%;background:#ff1493;box-shadow:0 0 10px #ff1493;}
.card h2{font-size:24px;font-weight:700;}
.card p{color:#ffe4ec;font-size:15px;margin-bottom:20px;}
.btn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  font-size:17px;
  font-weight:700;
  cursor:pointer;
  transition:0.3s;
}
.btn-love{
  background:linear-gradient(90deg,#FF1493,#ff4da6);
  color:#fff;
  box-shadow:0 4px 20px rgba(255,20,147,0.4);
}
.btn-love:hover{
  background:linear-gradient(90deg,#ff4da6,#FF1493);
  transform:translateY(-3px);
  box-shadow:0 6px 25px rgba(255,20,147,0.6);
}
</style>
</head>
<body>

<!-- Floating hearts -->
<div class="heart" style="left:10%;">💖</div>
<div class="heart" style="left:25%; animation-delay:1s;">❤️</div>
<div class="heart" style="left:40%; animation-delay:2s;">💕</div>
<div class="heart" style="left:60%; animation-delay:1.5s;">💖</div>
<div class="heart" style="left:80%; animation-delay:3s;">❤️</div>

<div class="container">

  <a href="index.html" class="back">← Back to Home</a>
  
  <div class="header">
    <img src="https://cdn-icons-png.flaticon.com/512/833/833472.png" alt="Love">
    <h1>Love Calculator</h1>
  </div>

  <!-- SUDHU 1 TAI CARD -->
  <div class="card">
    <div class="card-header">
      <div class="dot"></div>
      <h2>Check Compatibility</h2>
    </div>
    <p>Enter 2 names and find your love % instantly 💑</p>
    <button class="btn btn-love" onclick="window.location.href='love-calculator.html'">💖 Open Love Test</button>
  </div>

</div>
</body>
  </html>
