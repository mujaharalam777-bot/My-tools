<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pro QR Generator | My Tools</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="qr-pro.css">

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

</head>

<body>

<div class="container">

<header class="header">

<a href="qr.html" class="back-btn">
⬅ Back
</a>

<h1>
🚀 Pro QR Generator
</h1>

<p>
40+ Premium QR Features
</p>

</header>

<div class="main-layout">

<!-- Left Panel -->

<div class="left-panel">

<h2>Create QR Code</h2>

<div class="tabs">

<button class="active">URL</button>

<button>Text</button>

<button>WiFi</button>

<button>Email</button>

<button>Phone</button>

<button>SMS</button>

<button>WhatsApp</button>

</div>
<!-- URL -->

<div class="input-group">

<label>Website URL</label>

<input
type="text"
id="urlInput"
placeholder="https://example.com">

</div>

<!-- TEXT -->

<div class="input-group">

<label>Text</label>

<textarea
id="textInput"
rows="4"
placeholder="Write anything..."></textarea>

</div>

<!-- WIFI -->

<div class="input-group">

<label>WiFi Name (SSID)</label>

<input
type="text"
id="wifiName"
placeholder="Home WiFi">

</div>

<div class="input-group">

<label>Password</label>

<input
type="password"
id="wifiPassword"
placeholder="Password">

</div>

<!-- EMAIL -->

<div class="input-group">

<label>Email Address</label>

<input
type="email"
id="emailInput"
placeholder="example@gmail.com">

</div>

<div class="input-group">

<label>Email Subject</label>

<input
type="text"
id="emailSubject"
placeholder="Subject">

</div>

<!-- PHONE -->

<div class="input-group">

<label>Phone Number</label>

<input
type="tel"
id="phoneInput"
placeholder="+91XXXXXXXXXX">

</div>

<!-- SMS -->

<div class="input-group">

<label>SMS Number</label>

<input
type="tel"
id="smsNumber"
placeholder="+91XXXXXXXXXX">

</div>

<div class="input-group">

<label>SMS Message</label>

<textarea
id="smsMessage"
rows="3"
placeholder="Type message..."></textarea>

</div>

<!-- WhatsApp -->

<div class="input-group">

<label>WhatsApp Number</label>

<input
type="tel"
id="waNumber"
placeholder="91XXXXXXXXXX">

</div>

<div class="input-group">

<label>WhatsApp Message</label>

<textarea
id="waMessage"
rows="3"
placeholder="Hello..."></textarea>

</div>

<button
id="generateBtn"
class="generate-btn">

Generate Pro QR

</button>

</div>

<!-- Right Panel -->

<div class="right-panel">

<h2>QR Preview</h2>

<div
id="previewBox"
class="preview-box">

<p>QR Preview will appear here</p>

  </div>
  <div class="action-buttons">

<button id="pngBtn" class="action-btn">
📥 PNG
</button>

<button id="svgBtn" class="action-btn">
🖼 SVG
</button>

<button id="pdfBtn" class="action-btn">
📄 PDF
</button>

<button id="copyBtn" class="action-btn">
📋 Copy
</button>

</div>

<div class="info-card">

<h3>QR Information</h3>

<p id="qrInfo">
No QR Generated Yet.
</p>

</div>

<div class="info-card">

<h3>History</h3>

<div id="historyList">
No History Available
</div>

</div>

<div class="info-card">

<h3>Favorites</h3>

<div id="favoriteList">
No Favorite QR
</div>

</div>

<div class="stats-grid">

<div class="stat-box">
<h2 id="totalQR">0</h2>
<p>Total QR</p>
</div>

<div class="stat-box">
<h2 id="todayQR">0</h2>
<p>Today</p>
</div>

<div class="stat-box">
<h2 id="downloadQR">0</h2>
<p>Downloads</p>
</div>

</div>

</div>

</div>

<footer class="footer">

<p>© 2026 My Tools • Pro QR Generator</p>

</footer>

<script src="qr-types.js"></script>
<script src="download.js"></script>
<script src="history.js"></script>
<script src="premium.js"></script>

</body>
  </html>
