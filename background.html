<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Background Remove Card</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

body {
  /* // EDIT HERE PREMIUM GRADIENT BACKGROUND */
  background: linear-gradient(135deg, #0A0A0A 0%, #1A0A2E 50%, #0A0A0A 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
  overflow: hidden;
  position: relative;
}

/* // EDIT HERE PREMIUM GLOW EFFECT */
body::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(139, 92, 246, 0.3) 0%, transparent 70%);
  transform: translate(-50%, -50%);
  filter: blur(80px);
  z-index: 0;
}

.container { text-align: center; width: 100%; max-width: 400px; z-index: 2; }

.back-btn { color: #fff; text-decoration: none; font-size: 14px; display: flex; align-items: center; gap: 5px; margin-bottom: 20px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }

.scissors { font-size: 60px; filter: drop-shadow(0 0 15px rgba(139, 92, 246, 0.8)); animation: glow 2s ease-in-out infinite; margin-bottom: 10px; }

@keyframes glow {
 0%, 100% { filter: drop-shadow(0 0 15px rgba(139, 92, 246, 0.8)); }
 50% { filter: drop-shadow(0 0 25px rgba(139, 92, 246, 1)); }
}

h1 { color: #fff; font-size: 28px; font-weight: 700; text-shadow: 0 2px 10px rgba(0,0,0,0.3); margin-bottom: 20px; }

.card {
  background: rgba(255, 255, 255, 0.08); /* // EDIT HERE More glassy */
  backdrop-filter: blur(25px);
  -webkit-backdrop-filter: blur(25px);
  border-radius: 24px;
  border: 1px solid rgba(139, 92, 246, 0.3); /* // EDIT HERE Purple border */
  padding: 30px 20px;
  box-shadow: 0 8px 32px rgba(139, 92, 246, 0.2); /* // EDIT HERE Purple shadow */
}

.card-title { display: flex; align-items: center; justify-content: center; gap: 8px; color: #fff; font-size: 20px; font-weight: 600; margin-bottom: 12px; }
.dot { width: 10px; height: 10px; background: #8B5CF6; border-radius: 50%; box-shadow: 0 0 10px #8B5CF6; }
.card-text { color: rgba(255, 255, 255, 0.85); font-size: 14px; line-height: 1.6; margin-bottom: 20px; }

.btn {
  background: linear-gradient(135deg, #8B5CF6 0%, #A855F7 100%);
  color: #fff; border: none; padding: 16px 24px; border-radius: 16px;
  font-size: 16px; font-weight: 700; width: 100%; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: 0 4px 20px rgba(139, 92, 246, 0.5); transition: all 0.3s ease;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(139, 92, 246, 0.7); }

/* // EDIT HERE FLOATING EMOJIS */
.float-emoji {
  position: absolute;
  font-size: 24px;
  opacity: 0.4; /* // EDIT HERE Halka kore dilam */
  animation: float 6s ease-in-out infinite;
  z-index: 1;
  filter: drop-shadow(0 0 8px rgba(139, 92, 246, 0.5));
}
@keyframes float {
  0%, 100% { transform: translateY(0px) rotate(0deg); }
  50% { transform: translateY(-20px) rotate(10deg); }
}
.float1 { bottom: 15%; left: 10%; animation-delay: 0s; }
.float2 { bottom: 10%; right: 15%; animation-delay: 2s; }
.float3 { bottom: 5%; left: 40%; animation-delay: 4s; }
</style>
</head>
<body>

<div class="container">
  <a href="index.html" class="back-btn">← Back to Home</a>
  
  <div class="scissors">✂️</div>
  <h1>Background Remove</h1>
  
  <div class="card">
    <h2 class="card-title"><span class="dot"></span> Remove BG Instantly</h2>
    <p class="card-text">Upload photo and remove background<br>in 1 click 🖼️✨</p>
    <button class="btn" onclick="window.location.href='background-remove.html'">✂️ Open BG Remover</button>
  </div>
</div>

<!-- // EDIT HERE FLOATING BG EMOJIS -->
<div class="float-emoji float1">🖼️</div>
<div class="float-emoji float2">✂️</div>
<div class="float-emoji float3">🪄</div>

</body>
</html>
