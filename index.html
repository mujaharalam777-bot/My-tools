<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Tools - 100+ Free Tools</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Arial,sans-serif;}
body{background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);color:#fff;min-height:100vh;}
header{background:linear-gradient(90deg,#2563eb,#7c3aed);padding:35px 20px;text-align:center;}
header h1{font-size:32px;margin-bottom:8px;}
header p{opacity:.85;font-size:16px;}
.container{width:95%;max-width:1200px;margin:25px auto;padding:10px;}
.search-box{width:100%;padding:14px 18px;border:none;border-radius:14px;font-size:16px;margin-bottom:25px;outline:none;background:rgba(255,255,255,.1);color:#fff;}
.search-box::placeholder{color:#aaa;}
.tools-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:18px;}
.card{background:rgba(255,255,255,.08);padding:25px 15px;border-radius:18px;text-align:center;transition:.3s;text-decoration:none;color:#fff;display:block;backdrop-filter:blur(15px);border:1px solid rgba(255,255,255,.1);}
.card:hover{transform:translateY(-8px);background:rgba(255,255,255,.15);box-shadow:0 10px 30px rgba(0,0,0,.3);}
.card .icon{font-size:42px;margin-bottom:12px;display:block;}
.card p{font-size:15px;font-weight:600;}
</style>
</head>
<body>

<header>
  <h1>🚀 My Tools</h1>
  <p>100+ Free Online Tools For You</p>
</header>

<div class="container">
  <input type="text" class="search-box" placeholder="Search Tools...">

  <div class="tools-grid">
    
    <a href="age.html" class="card">
      <span class="icon">🎂</span>
      <p>Age Calculator</p>
    </a>

    <a href="bmi.html" class="card">
      <span class="icon">⚖️</span>
      <p>BMI Calculator</p>
    </a>

    <a href="qr.html" class="card">
<span>📱</span>
QR Generator
    </a>

    <a href="pdf.html" class="card">
      <span class="icon">📄</span>
      <p>PDF Tools</p>
    </a>

    <a href="word.html" class="card">
      <span class="icon">abc</span>
      <p>Word Counter</p>
    </a>

    <a href="color.html" class="card">
      <span class="icon">🎨</span>
      <p>Color Picker</p>
    </a>

  </div>
</div>

</body>
</html>
